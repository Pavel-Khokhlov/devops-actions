name: CI Pipeline
 
on:
  push:
    branches: [main]
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Установка зависимостей
        run: npm ci
 
      - name: Линтинг
        run: npm run lint
 
      - name: Запуск тестов
        run: npm run test

      - name: Сборка Docker-образа
        run: docker build -t ${{ secrets.DOCKER_USER }}/gh-actions-img:${{ github.sha }} .

